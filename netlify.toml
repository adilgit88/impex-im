# Netlify configuration for IMPEX TILES staging
# Root URL redirects directly to the immersive landing page

[build]
  publish = "."

# Root → Landing page (force = true overrides the existing index.html)
[[redirects]]
  from = "/"
  to = "/landing/"
  status = 302
  force = true

# Clean subfolder URLs without trailing-slash issues
[[redirects]]
  from = "/landing"
  to = "/landing/index.html"
  status = 200

[[redirects]]
  from = "/showers-taps"
  to = "/showers-taps/index.html"
  status = 200

[[redirects]]
  from = "/tubs-toilets"
  to = "/tubs-toilets/index.html"
  status = 200

# Block search engines from indexing the staging site
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
